# publishers.yaml - Configuration for scraping forthcoming book covers
#
# Each publisher entry defines:
#   name          - Display name of the publisher
#   url           - URL to the forthcoming/coming-soon page
#   navigation    - How to traverse the page: "static" | "paginated" | "carousel" | "infinite-scroll" | "multi-click"
#   navigation_options - Extra options for the navigation strategy (selectors, max pages, etc.)
#   book_selector - CSS selector for each book entry on the page
#   title_selector - CSS selector for the book title within a book entry
#   cover_selector - CSS selector for the cover image within a book entry
#   hires_source  - Where to get hi-res images: "amazon" | "waterstones" | "direct"
#   isbn_selector - (optional) CSS selector for ISBN data
#   default_genre - Fallback genre if none can be extracted from the page
#   placeholder   - Rules for detecting placeholder images
#     known_hashes    - Perceptual hashes of known placeholder images
#     text_patterns   - OCR text patterns indicating a placeholder
#     min_file_size_kb - Images below this size (KB) are likely placeholders

publishers:
  - name: "Two Dollar Radio"
    url: "https://twodollarradio.com/collections/forthcoming"
    navigation: "static"
    book_selector: ".product-card"
    title_selector: ".product-card__title"
    cover_selector: ".product-card__image img"
    hires_source: "direct"
    default_genre: "Literary & Historical Fiction"
    placeholder:
      min_file_size_kb: 10

  - name: "Milkweed Editions"
